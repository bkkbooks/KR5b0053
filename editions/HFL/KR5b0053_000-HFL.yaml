body:
  text: 服一四廻元五鍊至道上靈照耀日月洞照九明諸大開宥幽夜玄清朽骸超歩錬化自生嘘吸靈和貫幽入𡨋神竒萬變飛䰟反形乗煙駕空上造皇庭玉書告命土府太平一切受度普入光明有寳我文世世化生輕泄慢漏風刀相刑玉章靈文生朱光五靈結精煥十方四八分位合五行列宿日月隂陽通植立天眞保上皇開化法門一切同彌羅大千道興隆金座懽樂難爲常諸天踊躍奏靈章開我妙道悟少童令爾億劫生無窮九轉成眞位仙王祕之中襟愼勿揚天尊頌畢諸天上帝無極太上大道君十方無極至眞大聖衆飛天神王五老上帝君南上好生度世司馬司緑司命長生上靈玄和玉女諸元君靈妃諸眞人無鞅數衆七千二百四十童子一時俱起捻香散花左廻旋行三匝還北向作禮舉手彈指三十二天日月星宿一時俱明地下九幽無極洞淵光景玄徹無復闇𡨋幽隱普見地藏發世金玉露形山川溪澗一等緬平白骨受氣朽尸還䰟九土清泰地官安寜衆生普度一切無偏大法流化皇道開張普告諸天日月星辰璇璣玉衡南斗北斗司命司録韓君主録南昌上宫諸地諸水五嶽靈山三官九署十二河源長夜之府九幽之中四司五帝一切神明各遵承大法普同一慶以今爲新無上無下無極無窮無深無遠無幽無隱無邊無際無大無小無始無終一切神靈彈指告命依承仰從靈寳青帝錬度五仙安靈鎭神九氣天文東方九氣青天承元始符命吿下東方無極世界土府神鄉諸靈官令有太上清信弟子某甲滅度五仙託尸太隂今於某界安宫立室庇形后土明承正法安慰撫䘏青靈哺飴九氣朝華精光充溢錬飭形骸骨芳肉香億劫不灰東嶽泰山明開長夜九幽之府出某甲䰟神沐浴冠帶遷上南宫供給衣食長在光明魔無干犯一切神靈侍衛安鎭悉如元始盟眞舊無女青文黒書此文於青石上師拜黃繒章畢埋文於亾者尸形所在東鄉極墓界臨埋時師雲行禹歩九歩至所在東向讀大字及文畢叩齒二十四通嚥氣九過呪曰元始符命普告東方無極世界土府神鄕洞空洞無洞玄洞元九氣總司三界神官一切𡨋靈無極神王今日大慶青天始陽高駕臨正萬道開通甲乙受度託尸玄房太上清信䰟應上升五仙沐浴拂飭衣裳形庇靈獄地爲開張請以玉女安鎭神宫一切侍衛供給自然須䰟反尸上帝奉迎一如明眞舊典施行畢便埋文土中也靈寳赤帝錬度五仙安靈鎭神三氣天文南方三氣丹天承元始符命告下南方無極世界土府神鄉諸靈官今有太上清信弟子某甲滅度五仙託尸太隂今於其界安宫立室庇形后土明承正法安慰赤靈哺飴三氣丹地精光充溢錬飭形骸骨芳肉香億劫不灰南嶽衡山明開長夜九幽之府出某甲䰟神沐浴冠帶遷上南宫供給衣食長在光明魔無干犯一切神靈侍衛安鎭悉如元始盟眞舊典女青文青書此文於赤石上師拜黃繒章畢埋文於亾人尸形所住南鄉極墓界臨埋時師雲行禹歩三歩至所在南向讀大字及文畢叩齒二十四通嚥氣三過呪曰元始符命普告南丹無極世界土府神官洞空洞無洞玄自然三氣總司一切𡨋靈三界神王普監盟言今日上告太陽吿丹甲乙歸玄託尸九玄位齊飛天空受轉輪䰟升朱陵鍊度五仙功未洞眞庇形土官開張四界安鎭靈宫在所營衛供給送迎無令揺動干犯神鄉盟眞所告一切咸聞畢便埋文土中靈寳黃帝鍊度五仙安靈鎭神中元天文中元皇天承元始符命吿下中央九壘土府洞極神鄉四統諸靈官今有太上清信弟子某甲滅度五仙託尸玄隂今於某界安宫立室庇形后土明承正法安慰撫䘏黃元哺飴流注豐淵鍊飭形骸骨芳氣香與神同元億劫長存中嶽嵩高明開長夜九幽之府出甲乙䰟神沐浴冠帶遷上南宫供給衣食長存光明魔無干犯一切神靈侍衛安鎭如元始明眞舊典女青文朱書此文於黃石上師拜黃繒章畢埋文於亾人尸形所住中央臨埋時師雲行禹歩十二歩至所在向戊已讀大字及文畢叩齒二十四通嚥氣十二過呪曰元始符命普告中元九壘土府洞極神鄉四維總靈十二神官黃元靈鈕高眞土皇今日大慶萬神臨軒甲乙受度託尸九玄䰟升𩲸守庇形土官四極告命明郎開張安慰撫䘏供給送迎無令揺動干犯神鄉明如太眞一切咸聞畢便埋文土中靈寳白帝錬度五仙安靈鎭神七氣天文西方七氣素天承元始符命告下西方無極世界土府神鄉諸靈官令有太上清信弟子某甲滅度五仙託尸太隂今於某界安宫立室庇形后土明承正法安慰撫䘏素靈哺飴七氣素華精光充溢錬飭形骸骨芳肉香億劫不灰西嶽華山明開長夜九幽之府出某甲䰟神沐浴冠帶遷上天府供給衣食長在光明魔無干犯一切神靈侍衛安鎭如元始明眞舊典女青文黄書此文於白石上師拜黃繒章畢埋文於亾人尸形所住西鄉極墓界臨埋時師雲行禹歩七歩至所在西向請大字及文畢叩齒二十四通閉氣七過呪曰元始符命普吿西靈無極世界土府神明洞空洞無洞玄洞清七氣總司三界神庭西鄉一切萬氣𡨋靈無極神王監眞度生今日五合少隂告盟甲乙受度五仙鍊形託尸幽户中房暫經太上清信衆眞所明地鄉開明萬神經營尸安𩲸鎭億劫長寜道成去世奉以靈軿一如明眞依舊驛呈畢便埋文土中靈寳黒帝錬度五仙安靈鎭神五氣天文北方五氣玄天承元始符命告下北方無極世界土府神鄉諸靈官令有太上清信弟子某甲滅度五仙託尸太隂今於某界安宫立室庇形后土明承正法安慰撫䘏玄靈哺飴五氣玉滋精光充溢錬飭形骸骨芳肉香億劫不灰北嶽𢘆山明開長夜九幽之府出某甲䰟神沐浴冠帶遷上天府供給衣食長在光明魔無干犯一切神靈侍衛安鎭如元始盟眞舊典女青文白書此文於黒石之上師拜黃繒章畢埋文於亾人尸形所住北鄉極墓界臨埋時師雲行禹歩五歩至所在北向讀大字及文畢叩齒二十四通閉氣五過呪曰元始符命普告北元無極世界土府皇君洞空洞無洞玄洞淵五氣總司三界高尊北鄉𡨋靈無極神君日吉時和玄天始分上聖臨慶北帝敷雲甲乙受度託尸幽門太上清信位齊十天五土藏形三官舉䰟南宫沐浴朽骸生薫庇形靈阜億劫長存正道豁落安鎭玉文一切神明供給自然明眞大法宣告普聞便埋文土中東方飛天神人曰開度東方九幽地獄三塗五苦轉還福堂安鎭死者形體故宅令得安寜土府營衛奉給送迎當依明眞玉匱女青上宫舊典以青紋繒九十尺或九尺詣九氣天君請諸天玉文女青符命告下東鄉諸靈官拔度東方九幽地獄三塗五苦餓鬼死䰟開出光明安鎭死者形骸宫宅長得安寜無有揺動如女青文南方飛天神人曰開度南方九幽地獄三塗五苦轉還福堂安鎭死者形體故宅令得安寜土府營衛奉給送迎當依明眞玉匱女青上宫舊典以赤紋繒三十尺詣三氣天君請諸天玉文女青符命告下南鄉諸靈官拔度南方九幽地獄三塗五苦餓鬼死䰟開出光明安鎭死者形骸宫宅長得安寜無有揺動如女青文中央飛天神人曰開度中央九幽地獄三塗五苦轉還福堂安鎭死者形體故宅令得安寜土府營衛奉給送迎當依明眞玉匱女青上官舊典以黃紋繒一百二十尺或一十二尺詣一氣天君請元始自然眞文女青符命告下中央四維無上無下無幽無隱無深無遠無邊無際無極洞玄諸靈官拔度中央九幽地獄三塗五苦餓鬼死䰟開出光明安鎭死者形骸宫宅長得安寜無有揺動如女青文西方飛天神人曰開度西方九幽地獄三塗五苦轉還福堂安鎭死者形體故宅令得安寜土府營衛奉給送迎當依明眞玉匱女青上宫舊典以白紋繒七十尺或七尺詣七氣天君請諸天玉文女青符命吿下西鄉諸靈官拔度西方九幽地獄三塗五苦餓鬼死䰟開出光明安鎭死者形骸宫宅長得安寜無有揺動如女青文北方飛天神人曰開度北方九幽地獄三塗五苦轉還福堂安鎭死者形體故宅令得安寜土府營衛奉給送迎當依明眞玉匱女青上宫舊典以黒紋繒五十尺或五尺詣五氣天君請諸天玉文女青符命吿下北鄉諸靈官拔度北方九幽地獄三塗五苦餓鬼死䰟開出光明安鎭死者形骸宫宅長得安寜無有揺動如女青文飛天神人曰明眞科品天子用信匹數公王國主則用丈數悉用紋繒上金以法天象之庶人則用尺數鐵以准金宣吿諸天人民咸使普聞飛天神人曰夫欲安鎭死人尸形所在地官安慰撫䘏使得速還更生福世興家致祿世世不絶當依明眞科天子公王以上金五兩以奉五帝安鎭五方庶人則用鐵五十斤生死㓕度因縁之信其福無量宣告諸天人民咸使普聞天眞皇人曰夫開度拔贖宿對罪䰟安鎭尸形宫宅其文出自龍漢之光天尊今開大法教化童子諸天大神而披龍漢之玄奥開演洞玄之祕文拔出長夜之府使九幽得荷太陽之光孤爽還反則朽骸有縁福堂可得而至衣食立以自然飛天可以交遊㩦提太上之賔此法高妙難可稱焉四座大衆諸天童子冝各寳之哉於是四衆同時稽首伏地稱善而退太上洞玄靈寳滅度五鍊生尸妙經
