front:
  text: 太上洞玄靈寳滅度五鍊生尸妙經服一天尊時於長樂舍香林園中教化七千二百四十童子法事粗悉上智童子輪天童子等前進作禮上白天尊今日侍座懽樂難勝諸天開宥一切光明幽牢地獄積夜寒鄉三塗五苦餓鬼死䰟並得開度還在福中三官息對生死並懽而幽䰟始開末入轉輪尸神奔落腐骸無津沈淪九土縱橫地官飛爽傍偟不能得還土府促㑹形尸無寧更受愁迫仰訴諸天令旣開宥一切普新皇道旣暢澤被十方伏聞天尊旣垂大慈願皇恩賜應度者度應生者生應轉者轉應還者還如宿縁未絶不得還者形尸故宅幽在九泉爲衆靈所迫不相容受飛䰟無泊還逮子孫大化旣興冝使普蠲不審法中復有何要可得申宣下告地官安鎭撫䘏咸使得安九署右别營衛其身如蒙哀憐則普天懽泰生死無怨福流億劫世世無窮林是天尊普命諸天上帝無極大上大道君十方大聖衆至眞諸君丈人飛天神王五老帝君南上好生度世司馬司錄司命長生上聖玄和玉文諸眞人無鞅數衆一時復坐今當更爲上智童子開諸法門申明龍漢玄都舊典九幽玉匱女青玉文拔度幽牢地獄積夜寒鄉三塗五苦餓鬼死䰟令悉見光明宣告諸天各明玉字自然玄文普吿諸天諸地水府日月星宿璇璣玉衡三界五帝五嶽靈山九土靈官洞元洞淵洞空洞靈洞無無極無窮無高無下無形無色無音無響無大無小一切神靈明各任别今所統領宿讁罪䰟善惡功過年嵗日月事事列言分別故宅形骸所在隨其部界悉爲安䘏地祇衛護經營供給無令揺動隨功成就使應遷者遷應度者度應轉者轉應生者生落地简對絶水盟言除天文墨一切見明於是四衆上智童子懽喜作禮同時舉手彈指稱善是時三十二天帝君即坐各命飛天神人披紫陽玉臺開明眞玉匱出天中靈音自然玉書無量洞章以屬地官度一切人安尸鎭靈保䰟録神其太黃皇曾天太明玉完天清明何童天玄胎平育天元明文舉天七耀摩夷天虚無越衡天太極濛翳天合八天天有八字合六十四字分屬東方九氣天君以青帝太玄女青符命告下東方土府九署靈官開度一切死䰟安鎭尸形營衞撫䘏無令地官驅迫摇動一如女青文金龍驛行其赤明和陽天玄明叅華天耀明宗飄天笁落皇笳天虚明堂耀天觀明端靜天玄明恭慶天太煥極瑶天合八天天有八字合六十四字分屬南方三氣天君以赤帝太玄女青符命吿下南方土府九署靈官開度南方一切死䰟安鎭尸形營衛撫䘏無令地官驅迫揺動一如女青文金龍驛行其元載孔升天太安皇崖天顯定極風天始皇孝𦬆天太黄翁重天無思江由天上揲阮樂天無極曇誓天合八天天有八字合六十四字分屬西方七氣天君以白帝太玄女青符命告下西方土府九署靈官開度西方一切死䰟安鎭尸形營衛撫䘏無令地官驅迫揺動一如女青文金龍驛行其皓庭霄度天淵通元洞天翰寵妙成天秀樂禁上天無上常融天玉隆騰勝天龍變梵度天平育賈奕天合八天天有八字合六十四字分屬北方五氣天君以黒帝太玄女青符命告下北方土府九署靈官開度北方一切死䰟安鎭尸形營衛撫䘏無令地官驅迫揺動一如女青文金龍驛行其上上上一氣一氣上上上無極無頂無色大羅之天自然玉文總統中央黃元天君以黄帝太玄女青符命告下中央土府九署靈官開度中央一切死䰟安鎭尸形營衛撫䘏無令地官驅迫揺動一如女青文金龍驛傳諸天各命飛天神王以天中靈音自然玉書女青符命並告五方五帝王嶽土府靈官即各依承符命尊奉大法皇道旣明是時天朗氣澄三景停輪星宿洞耀璇璣不行河海靜黙山嶽吞烟時和氣清金風拂塵天無浮翳日月灌津五苦解脫長夜開䰟枯樹生華死骸還人麟舞鳯翔飛鳴欣欣諸天踊躍散花稱善天尊欣暢而作頌曰赤明廻化混爾而分隂陽鍊變其道自然玄圖七轉至九仍還元命靈章無量洞篇無常之品氣總九晨陽光潜啓明景乗煙三廻五錬和以七津隨色蔚耀各歸本神大法簡度朽骸還人寳我妙道位登上眞
